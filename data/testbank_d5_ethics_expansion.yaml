- id: TCH-ETH-015
  set_id: testbank_d5_ethics_expansion
  domain: ethics
  subcompetency: จรรยาบรรณต่อวิชาชีพ
  competency_level: 'Level 3: ประยุกต์ใช้และวิเคราะห์'
  difficulty_level: hard
  question_text: 'สถานการณ์: ครูตรวจข้อสอบแล้วพบว่าให้คะแนนผิดพลาด ทำให้นักเรียนคนหนึ่งได้เกรดต่ำกว่าที่ควรจะเป็น แต่การแก้ไขจะต้องทำเอกสารหลายฉบับ

    คำถาม: ครูควรปฏิบัติอย่างไร'
  options:
  - ไม่แก้ไขเพราะนักเรียนไม่ได้มาร้องเรียน
  - แก้ไขเฉพาะกรณีที่นักเรียนมาทักท้วงเท่านั้น
  - ดำเนินการแก้ไขคะแนนอย่างถูกต้องและโปร่งใสตามระเบียบ แม้จะใช้เวลา
  - ให้คะแนนพิเศษในงานถัดไปเพื่อชดเชยโดยไม่บันทึกในระบบ
  correct_answer: 2
  explanation: จรรยาบรรณต่อวิชาชีพกำหนดให้ซื่อสัตย์สุจริตและรับผิดชอบต่อวิชาชีพ การแก้ไขข้อผิดพลาดอย่างโปร่งใสจึงจำเป็น
  standard_ref: จรรยาบรรณต่อวิชาชีพ ข้อ 2
  status: published
- id: TCH-ETH-016
  set_id: testbank_d5_ethics_expansion
  domain: ethics
  subcompetency: จรรยาบรรณต่อวิชาชีพ
  competency_level: 'Level 4: ประเมินค่าและสร้างสรรค์'
  difficulty_level: medium
  question_text: 'สถานการณ์: ครูไม่เห็นด้วยกับนโยบายใหม่ของโรงเรียน แต่ผู้บริหารสั่งให้ปฏิบัติตามทุกคน มีเพื่อนครูบางคนเสนอให้เพิกเฉยเพราะไม่เห็นด้วย

    คำถาม: ครูควรปฏิบัติอย่างไร'
  options:
