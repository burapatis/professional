  domain: ethics
  subcompetency: จรรยาบรรณต่อสังคม
  competency_level: 'Level 3: ประยุกต์ใช้และวิเคราะห์'
  difficulty_level: hard
  question_text: 'สถานการณ์: ครูเห็นโพสต์ในโซเชียลมีเดียที่บิดเบือนข้อมูลเกี่ยวกับโรงเรียนและทำให้ชุมชนเข้าใจผิด

    คำถาม: ครูควรดำเนินการอย่างไร'
