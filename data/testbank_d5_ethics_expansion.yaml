  question_text: 'สถานการณ์: โรงเรียนจะจัดงานวันวัฒนธรรมท้องถิ่น แต่คณะครูมีความเห็นไม่ตรงกันว่าควรเน้นวัฒนธรรมไทยกลางหรือวัฒนธรรมท้องถิ่นของชุมชน

    คำถาม: ครูควรเสนอแนวทางอย่างไร'
