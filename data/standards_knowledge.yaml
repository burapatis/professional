# มาตรฐานที่ 1 (ก): มาตรฐานความรู้ — 6 ข้อ
# อ้างอิง: ข้อบังคับคุรุสภาว่าด้วยมาตรฐานวิชาชีพ (ฉบับที่ 4) พ.ศ. 2562 ข้อ ๓ (แก้ไขข้อ ๔ เดิม)
# + ประกาศคณะกรรมการคุรุสภา เรื่อง รายละเอียดของมาตรฐานความรู้และประสบการณ์วิชาชีพครู (2563)
# อัปเดตล่าสุด: แทนที่โครงสร้างเดิม 11 ด้าน (ตามข้อบังคับ พ.ศ. 2556 ฉบับแรก ซึ่งถูกแก้ไขแล้ว)
- num: 1
  title: "การเปลี่ยนแปลงบริบทของโลก สังคม และแนวคิดของปรัชญาเศรษฐกิจพอเพียง"
- num: 2
  title: "จิตวิทยาพัฒนาการ จิตวิทยาการศึกษา และจิตวิทยาให้คำปรึกษาในการวิเคราะห์และพัฒนาผู้เรียนตามศักยภาพ"
- num: 3
  title: "เนื้อหาวิชาที่สอน หลักสูตร ศาสตร์การสอน และเทคโนโลยีดิจิทัลในการจัดการเรียนรู้"
- num: 4
  title: "การวัด ประเมินผลการเรียนรู้ และการวิจัยเพื่อแก้ปัญหาและพัฒนาผู้เรียน"
- num: 5
  title: "การใช้ภาษาไทย ภาษาอังกฤษเพื่อการสื่อสาร และการใช้เทคโนโลยีดิจิทัลเพื่อการศึกษา"
- num: 6
  title: "การออกแบบและการดำเนินการเกี่ยวกับงานประกันคุณภาพการศึกษา"
