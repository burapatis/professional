  - เลือกใช้เฉพาะผลวิจัยที่สอดคล้องกับความเชื่อเดิมของครู
  - นำผลวิจัยของผู้อื่นมาใช้ทั้งหมดโดยไม่วิเคราะห์ความสอดคล้องกับบริบทตน
  - วิเคราะห์ผลการวิจัยอย่างรอบด้านแล้วนำไปประยุกต์ใช้ให้ตรงตามข้อค้นพบจริง
