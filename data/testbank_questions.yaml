  - สำคัญเฉพาะการสอบระดับชาติ ไม่เกี่ยวกับการประเมินในชั้นเรียนปกติ
  - เป็นเรื่องที่กระทบเฉพาะเวลาในการจัดทำเครื่องมือเท่านั้น
  correct_answer: 0
