  - ยึดผลสอบเดิมเป็นเกณฑ์ตัดสินความสามารถของผู้เรียนต่อไปโดยไม่ปรับวิธี
  - เพิ่มการประเมินตามสภาพจริงให้ผู้เรียนได้ประยุกต์ใช้ความรู้ในสถานการณ์ใกล้เคียงชีวิตจริง
  - ลดความสำคัญของผลสอบลงโดยไม่หาวิธีประเมินอื่นมาเสริมเพิ่มเติมเลย
