# คลังความรู้พัฒนาวิชาชีพ — รื้อโครงสร้างจาก 11 หัวข้อเดิม (ตามข้อบังคับ 2556) เป็น 6 หัวข้อใหม่
# (ตามข้อบังคับฉบับที่ 4 พ.ศ. 2562) เนื้อหาทฤษฎีเดิมทั้งหมดถูกจัดกลุ่มใหม่ ไม่มีการทิ้งเนื้อหา:
#   หมวด 1 ← เดิม 01 ความเป็นครู + 02 ปรัชญาการศึกษา + 11 คุณธรรมจริยธรรม (บริบทเชิงคุณค่า)
#   หมวด 2 ← เดิม 04 จิตวิทยาสำหรับครู (ตรงตัว)
#   หมวด 3 ← เดิม 05 หลักสูตร + 06 การจัดการเรียนรู้ + ส่วนหนึ่งของ 08 (TPACK/Blended)
#   หมวด 4 ← เดิม 09 การวัดและประเมินผล + 07 การวิจัยเพื่อพัฒนาการเรียนรู้
#   หมวด 5 ← เดิม 03 ภาษาและวัฒนธรรม + ส่วนหนึ่งของ 08 (การรู้เท่าทันสื่อ/AI)
#   หมวด 6 ← เดิม 10 การประกันคุณภาพการศึกษา (ตรงตัว)

- num: "01"
  title: "การเปลี่ยนแปลงบริบทของโลก สังคม และปรัชญาเศรษฐกิจพอเพียง"
  open: true
  body: "ว่าด้วยอัตลักษณ์ความเป็นครูในโลกที่เปลี่ยนแปลงเร็ว ตั้งแต่บทบาทของครูในฐานะผู้นำการเรียนรู้และผู้ฝึกฝนที่ใคร่ครวญตนเอง ฐานคิดทางปรัชญาการศึกษาที่กำหนดเป้าหมายการจัดการเรียนรู้ ไปจนถึงการประยุกต์ใช้ปรัชญาเศรษฐกิจพอเพียงในบริบทการศึกษาไทย และคุณธรรมจริยธรรมที่กำกับการตัดสินใจของครูในทุกสถานการณ์"
  tags: ["อัตลักษณ์วิชาชีพครู (Reflective Practitioner)", "Progressivism (Dewey) · Constructivism (Piaget/Vygotsky)", "ปรัชญาเศรษฐกิจพอเพียงด้านการศึกษา", "จริยศาสตร์วิชาชีพ"]
  tip: "ทบทวนปรัชญาการสอนและบันทึกสะท้อนคิดของตนเองอย่างสม่ำเสมอ พร้อมใช้จรรยาบรรณวิชาชีพครูเป็นกรอบคิดเมื่อต้องตัดสินใจในสถานการณ์ที่ไม่แน่ใจ"
  tip_link_url: "ethics/"
  tip_link_label: "จรรยาบรรณวิชาชีพครู"

- num: "02"
  title: "จิตวิทยาพัฒนาการ จิตวิทยาการศึกษา และจิตวิทยาให้คำปรึกษา"
  open: false
  body: "ความเข้าใจพัฒนาการ แรงจูงใจ และพฤติกรรมของผู้เรียนแต่ละคน เพื่อวิเคราะห์ศักยภาพและออกแบบการช่วยเหลือ ดูแล และให้คำปรึกษาผู้เรียนได้อย่างเหมาะสม"
  tags: ["ทฤษฎีพัฒนาการของ Piaget และ Vygotsky", "Self-Determination Theory", "Growth Mindset (Dweck)", "การจัดการชั้นเรียนเชิงบวก"]
  tip: "สังเกตและบันทึกพฤติกรรมผู้เรียนเป็นรายกรณี เพื่อปรับวิธีดูแลให้ตรงจุดมากขึ้น"
  tip_link_url: ""
  tip_link_label: ""

- num: "03"
  title: "เนื้อหาวิชาที่สอน หลักสูตร ศาสตร์การสอน และเทคโนโลยีดิจิทัลในการจัดการเรียนรู้"
  open: false
  body: "การออกแบบ วิเคราะห์ และปรับใช้หลักสูตรให้สอดคล้องกับเนื้อหาวิชาที่สอน เลือกศาสตร์การสอนที่เหมาะสม และบริหารบรรยากาศห้องเรียนพร้อมเทคโนโลยีดิจิทัล ให้ผู้เรียนทุกคนมีส่วนร่วมและเรียนรู้ได้อย่างมีประสิทธิภาพ"
  tags: ["Backward Design (Wiggins & McTighe) · แบบจำลองของ Tyler", "หลักสูตรฐานสมรรถนะ", "การสอนเชิงรุก (Active Learning) · การสอนแบบแยกระดับ (Tomlinson)", "UDL", "กรอบ TPACK (Mishra & Koehler) · Blended Learning"]
  tip: "เริ่มออกแบบบทเรียนจากผลลัพธ์การเรียนรู้ที่ต้องการก่อน แล้วทดลองใช้เทคนิคหรือเทคโนโลยีใหม่หนึ่งอย่างต่อภาคเรียน ก่อนนำไปใช้ในวงกว้าง"
  tip_link_url: ""
  tip_link_label: ""

- num: "04"
  title: "การวัด ประเมินผลการเรียนรู้ และการวิจัยเพื่อแก้ปัญหาและพัฒนาผู้เรียน"
  open: false
  body: "การออกแบบเครื่องมือวัดและประเมินผลที่สะท้อนการเรียนรู้จริงและนำผลไปใช้พัฒนาผู้เรียนต่อ ควบคู่กับการใช้กระบวนการวิจัยอย่างเป็นระบบเพื่อแก้ปัญหาและพัฒนาการเรียนรู้ในชั้นเรียนของตนเองอย่างต่อเนื่อง"
  tags: ["Assessment for Learning (Black & Wiliam)", "การประเมินตามสภาพจริง · การออกแบบเกณฑ์ประเมิน (Rubric)", "วงจรวิจัยปฏิบัติการ (Kemmis & McTaggart)"]
  tip: "ให้ข้อมูลย้อนกลับแก่ผู้เรียนระหว่างทางอย่างสม่ำเสมอ และเลือกปัญหาเล็กหนึ่งข้อในชั้นเรียนมาทำวิจัยปฏิบัติการแบบครบวงจรในหนึ่งภาคเรียน"
  tip_link_url: ""
  tip_link_label: ""

- num: "05"
  title: "การใช้ภาษาไทย ภาษาอังกฤษเพื่อการสื่อสาร และเทคโนโลยีดิจิทัลเพื่อการศึกษา"
  open: false
  body: "ทักษะการสื่อสารด้วยภาษาไทยและภาษาอังกฤษของครู ควบคู่กับความเข้าใจความหลากหลายทางวัฒนธรรมของผู้เรียน และการรู้เท่าทันเทคโนโลยีดิจิทัลรวมถึง AI เพื่อใช้เป็นเครื่องมือทางการศึกษาอย่างมีจริยธรรม"
  tags: ["การสอนคำนึงถึงวัฒนธรรม (Culturally Responsive Teaching)", "การรู้หนังสือเชิงวิชาการ · พหุภาษาในชั้นเรียน", "การรู้เท่าทันสื่อและ AI"]
  tip: "ใช้เวลาทำความเข้าใจบริบทครอบครัวและวัฒนธรรมของผู้เรียนอย่างต่อเนื่อง และออกแบบกิจกรรมที่ใช้เทคโนโลยีเพื่อให้ผู้เรียนคิดวิเคราะห์ ไม่ใช่เพียงรับข้อมูลฝ่ายเดียว"
  tip_link_url: ""
  tip_link_label: ""

- num: "06"
  title: "การออกแบบและการดำเนินการเกี่ยวกับงานประกันคุณภาพการศึกษา"
  open: false
