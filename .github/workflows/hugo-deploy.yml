name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout โค้ด
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: ติดตั้ง Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.163.0"
          extended: true

      - name: ตั้งค่า GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build ด้วย Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: อัปโหลดผลลัพธ์ build
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy ไป GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
