name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout โค้ด
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: ติดตั้ง Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.163.0"
          extended: true

      - name: ตั้งค่า GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: ดึงจำนวนผู้เข้าชมจาก Cloudflare Web Analytics
        id: cf_analytics
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_WEB_ANALYTICS_SITE_TAG: ${{ secrets.CLOUDFLARE_KRUJIT_WEB_ANALYTICS_SITE_TAG }}
          CLOUDFLARE_ANALYTICS_LOOKBACK_DAYS: "175"
          CLOUDFLARE_ANALYTICS_SINCE_YEAR: "2025"
        run: bash scripts/fetch-cf-analytics.sh

      - name: สรุปผลดึงข้อมูลผู้เข้าชม
        if: always()
        run: |
          {
            echo "## Cloudflare Web Analytics"
            if [[ -f data/.analytics-fetch-status ]]; then
              echo '```yaml'
              cat data/.analytics-fetch-status
              echo '```'
            else
              echo "_ไม่พบไฟล์สถานะ — ขั้นตอนดึงข้อมูลอาจไม่ได้รัน_"
            fi
            if [[ -f data/analytics.yaml ]]; then
              echo
              echo "### ข้อมูลที่จะใช้ใน footer"
              echo '```yaml'
              cat data/analytics.yaml
              echo '```'
            fi
            if [[ "${{ steps.cf_analytics.outcome }}" != "success" ]]; then
              echo
              echo "::warning title=ตัวนับผู้เข้าชม::ดึงข้อมูลจาก Cloudflare ไม่สำเร็จ — footer จะใช้ตัวเลขเดิมใน data/analytics.yaml"
              echo "⚠️ ดึงข้อมูลจาก Cloudflare ไม่สำเร็จ — ตรวจ log ขั้นตอนก่อนหน้า (มักเป็น API token ไม่มีสิทธิ์ Analytics: Read)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build ด้วย Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --minify \
            --baseURL "https://krujit.com/"

      - name: สร้างดัชนีค้นหา (Pagefind)
        run: npx -y pagefind@latest --site public

      - name: อัปโหลดผลลัพธ์ build
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy ไป GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
