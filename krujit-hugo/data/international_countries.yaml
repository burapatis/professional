# รายชื่อประเทศ/กรอบมาตรฐานวิชาชีพครู แบ่งตามภูมิภาค ใช้ใน international.html
# หมายเหตุ: การ์ด "ไทย" อัปเดตให้ตรงข้อบังคับฉบับที่ 4 (2562) แล้ว คือ 6 ด้านความรู้ / 15 ข้อย่อยการปฏิบัติงาน

asean:
  - name: "ไทย"
    org: "คุรุสภา"
    highlight: true
    body: "มาตรฐานวิชาชีพ 3 ด้าน (ความรู้และประสบการณ์ 6 มาตรฐาน / การปฏิบัติงาน 15 ข้อย่อย / การปฏิบัติตน) ตามที่อธิบายไว้แล้วในหน้ามาตรฐานวิชาชีพของครุจิต"
    tags: ["3 มาตรฐาน", "6 ด้านความรู้"]
    source_label: "เว็บไซต์คุรุสภา"
    source_url: "https://www.ksp.or.th"
  - name: "ฟิลิปปินส์"
    org: "PPST"
    body: "Philippine Professional Standards for Teachers แบ่งเป็น 7 โดเมน 37 สาระ พร้อมระดับความก้าวหน้าทางอาชีพ 4 ขั้น ตั้งแต่ครูเริ่มต้นจนถึงครูดีเด่น"
    tags: ["7 โดเมน", "4 ระดับอาชีพ"]
    source_label: "รายละเอียด PPST (DepEd Order 42, s. 2017)"
    source_url: "https://www.teacherph.com/philippine-professional-standards-for-teachers/"
  - name: "สิงคโปร์"
    org: "MOE · STP Framework"
    body: "Singapore Teaching Practice Framework แบ่งเป็น 4 โดเมน ได้แก่ ความรู้เชิงวิชาชีพ ทักษะเชิงวิชาชีพ คุณค่าเชิงวิชาชีพ และพัฒนาการของผู้เรียน"
    tags: ["4 โดเมน"]
    source_label: "สรุป STP Framework"
    source_url: "https://sapgrp.com/the-singapore-teaching-practice-framework-enhancing-excellence-in-education/"
  - name: "มาเลเซีย"
    org: "Standard Guru Malaysia 2.0"
    body: "ปรับปรุงโดยอ้างอิง SEA-TCF โดยตรง แบ่งเป็น 4 โดเมนสมรรถนะ (ความรู้ การสอน การมีส่วนร่วมกับชุมชน คุณภาพส่วนบุคคล) พร้อมองค์ประกอบจรรยาบรรณวิชาชีพแยกต่างหาก"
    tags: ["4 โดเมน", "+ จรรยาบรรณ"]
    source_label: "เอกสาร SGM 2.0 ฉบับเต็ม (KPM)"
    source_url: "https://anyflip.com/ijdxs/zipr/basic"
  - name: "อินโดนีเซีย"
    org: "UU No. 14/2005"
    body: "กฎหมายครูและอาจารย์กำหนดสมรรถนะครู 4 ด้านตามกฎหมาย ได้แก่ สมรรถนะด้านการสอน (pedagogik) บุคลิกภาพ (kepribadian) สังคม (sosial) และวิชาชีพ (profesional)"
    tags: ["4 สมรรถนะ", "กำหนดในกฎหมาย"]
    source_label: "สรุป UU No. 14/2005 ข้อ 8"
    source_url: "https://gurubinar.id/blog/4-kompetensi-guru-yang-wajib-dimiliki-oleh-calon-guru?blog_id=53"
  - name: "เวียดนาม"
    org: "หนังสือเวียน 20/2018"
    body: "มาตรฐานวิชาชีพครูการศึกษาทั่วไป 5 มาตรฐาน 15 เกณฑ์ ครอบคลุมความรู้วิชาชีพ การจัดการเรียนการสอน และคุณค่าทางจริยธรรมของครู ซึ่งเน้นด้านศีลธรรมมากเป็นพิเศษ"
    tags: ["5 มาตรฐาน", "15 เกณฑ์"]
    source_label: "หนังสือเวียน 20/2018/TT-BGDĐT (ฉบับภาษาอังกฤษ)"
    source_url: "https://thuvienphapluat.vn/van-ban/EN/Giao-duc/Circular-20-2018-TT-BGDDT-professional-standards-for-teachers-of-general-education-institutions/516430/tieng-anh.aspx"

europe:
  - name: "อังกฤษ (สหราชอาณาจักร)"
    org: "Teachers' Standards · DfE"
    body: "มาตรฐาน 8 ข้อด้านการสอน (เช่น ตั้งเป้าหมายสูง วางแผนบทเรียน ประเมินผล) บวกมาตรฐานความประพฤติส่วนบุคคลและวิชาชีพอีก 3 ข้อ ใช้ประเมินทั้งครูฝึกสอนและครูประจำ"
    tags: ["8 มาตรฐานการสอน", "+ ความประพฤติ"]
    source_label: "Teachers' Standards ฉบับเต็ม (GOV.UK)"
    source_url: "https://www.gov.uk/government/publications/teachers-standards"
  - name: "สกอตแลนด์"
    org: "GTC Scotland"
    body: "มีองค์กรกำกับวิชาชีพครูอิสระแห่งแรกของโลก (ตั้งแต่ปี 1965) กำหนดมาตรฐานวิชาชีพและทะเบียนครูของตนเอง รายละเอียดอธิบายไว้แล้วในหน้าหลักวิชาการสากล"
    tags: ["องค์กรกำกับอิสระ"]
    source_label: "เว็บไซต์ GTC Scotland"
    source_url: "https://www.gtcs.org.uk/"
  - name: "ฟินแลนด์"
    org: "ไม่มีรายการมาตรฐานแบบสากล"
    body: "ใช้แนวทางต่างจากประเทศอื่นอย่างชัดเจน คือไม่มีเอกสารมาตรฐานสมรรถนะแบบรายการ แต่กำหนดให้ครูทุกคนต้องจบปริญญาโทด้านการศึกษาที่เน้นการวิจัย แล้วให้ความเป็นอิสระทางวิชาชีพสูงมากในการตัดสินใจสอน"
    tags: ["ปริญญาโทวิจัย", "อิสระวิชาชีพสูง"]
    source_label: "ระบบครูฟินแลนด์ (Finland Toolbox)"
    source_url: "https://toolbox.finland.fi/life-society/teachers-in-finland/"
  - name: "ฝรั่งเศส"
    org: "Référentiel 2013"
    body: "กำหนดสมรรถนะร่วม 14 ข้อสำหรับบุคลากรการศึกษาทุกประเภท บวกสมรรถนะเฉพาะสำหรับครูผู้สอนอีก 5 ข้อ เช่น การจัดการเรียนการสอนที่คำนึงถึงความหลากหลายของผู้เรียน และการประเมินพัฒนาการผู้เรียน"
    tags: ["14 สมรรถนะร่วม", "+ 5 เฉพาะครู"]
    source_label: "Référentiel ฉบับเต็ม (Ministère de l'Éducation)"
    source_url: "https://www.education.gouv.fr/le-referentiel-de-competences-des-metiers-du-professorat-et-de-l-education-454473"
  - name: "เยอรมนี"
    org: "KMK (มติที่ประชุมรัฐมนตรีศึกษาฯ)"
    body: "เนื่องจากการศึกษาเป็นอำนาจของแต่ละรัฐ (16 รัฐ) จึงใช้มติร่วมของ KMK กำหนดสมรรถนะ 4 ด้านหลัก ได้แก่ การสอน การอบรมบ่มเพาะ การประเมินและให้คำปรึกษา และการสร้างนวัตกรรม"
    tags: ["4 สมรรถนะ", "ระบบกระจายอำนาจ"]
    source_label: "เว็บไซต์ KMK (Lehrkräftebildung)"
    source_url: "https://www.kmk.org/themen/allgemeinbildende-schulen/lehrkraefte/lehrkraeftebildung.html"

americas:
  - name: "สหรัฐอเมริกา"
    org: "InTASC · CCSSO"
    body: "ไม่มีองค์กรกำกับวิชาชีพครูระดับชาติ แต่ละรัฐออกใบอนุญาตเอง ส่วนใหญ่อ้างอิงมาตรฐาน InTASC 10 ข้อ แบ่งเป็น 4 หมวด ได้แก่ ผู้เรียนและการเรียนรู้ เนื้อหาวิชา การปฏิบัติการสอน และความรับผิดชอบทางวิชาชีพ"
    tags: ["10 มาตรฐาน", "ออกใบอนุญาตระดับรัฐ"]
    source_label: "เอกสาร InTASC ฉบับเต็ม (CCSSO ผ่าน ERIC)"
    source_url: "https://files.eric.ed.gov/fulltext/ED566116.pdf"
  - name: "แคนาดา (ออนแทรีโอ)"
    org: "Ontario College of Teachers"
    body: "องค์กรกำกับวิชาชีพครูที่ใหญ่ที่สุดของแคนาดา ใช้มาตรฐานการปฏิบัติวิชาชีพ 5 ด้าน (ความผูกพันต่อผู้เรียน ความรู้เชิงวิชาชีพ การปฏิบัติวิชาชีพ ภาวะผู้นำในชุมชนการเรียนรู้ การพัฒนาวิชาชีพต่อเนื่อง) ซึ่งอยู่ระหว่างปรับปรุงล่าสุดในปี 2026"
    tags: ["5 มาตรฐาน", "องค์กรกำกับอิสระ"]
    source_label: "Standards of Practice (Ontario College of Teachers)"
    source_url: "https://www.oct.ca/public/professional-standards/standards-of-practice"
  - name: "ออสเตรเลีย"
    org: "AITSL"
    body: "มาตรฐานวิชาชีพครูออสเตรเลีย (APST) มี 7 มาตรฐาน จัดกลุ่มเป็น 3 โดเมน (ความรู้เชิงวิชาชีพ การปฏิบัติเชิงวิชาชีพ การมีส่วนร่วมเชิงวิชาชีพ) และมีระดับความก้าวหน้าทางอาชีพ 4 ขั้นอย่างชัดเจน"
    tags: ["7 มาตรฐาน", "3 โดเมน · 4 ระดับ"]
    source_label: "Australian Professional Standards for Teachers (AITSL)"
    source_url: "https://www.aitsl.edu.au/standards/understand-the-teacher-standards"
