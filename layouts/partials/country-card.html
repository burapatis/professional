{{- $c := . -}}
<div class="country-card reveal{{ if $c.highlight }} highlight{{ end }}">
  <div class="flagrow"><h4>{{ $c.name }}</h4><span class="org">{{ $c.org }}</span></div>
  <p>{{ $c.body }}</p>
  <div class="tagrow">{{ range $c.tags }}<span>{{ . }}</span>{{ end }}</div>
  <a class="source-link" href="{{ $c.source_url }}" target="_blank" rel="noopener noreferrer">{{ $c.source_label }} <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>
</div>
