<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — ครุจิต{{ end }}</title>
<meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<link rel="icon" type="image/png" href="{{ "favicon.png" | relURL }}">
<link rel="apple-touch-icon" href="{{ "apple-touch-icon.png" | relURL }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@500;600;700&family=Sarabun:wght@300;400;500;600;700&family=Mitr:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ "css/base.css" | absURL }}">
{{ block "pagecss" . }}{{ end }}
</head>
<body>
<a href="#main" class="skip">ไปยังเนื้อหาหลัก</a>

{{ partial "header.html" . }}

<main id="main">
  {{ block "main" . }}{{ end }}
</main>

{{ if eq .Params.nav "home" }}
  {{ partial "footer-full.html" . }}
{{ else }}
  {{ partial "footer-simple.html" . }}
{{ end }}

<script src="{{ "js/site.js" | absURL }}"></script>
</body>
</html>
